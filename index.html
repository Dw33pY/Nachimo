<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NACHIMO CONTRACTORS LTD — Page not found.">
  <title>404 — Page Not Found | NACHIMO CONTRACTORS LTD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,400&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-dark: #0a0a0a;
      --c-light: #f5f5f5;
      --c-accent: #c9a84c; /* Gold accent based on previous styling */
      --font-display: 'Playfair Display', serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--c-dark);
      color: var(--c-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* Navigation */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      mix-blend-mode: difference;
    }

    .navbar__logo {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--c-light);
    }

    .navbar__logo em {
      color: var(--c-accent);
      font-style: normal;
    }

    /* Main 404 Content */
    .error-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 6rem 2rem 4rem;
      position: relative;
      overflow: hidden;
    }

    /* Subtle background texture */
    .error-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(201, 168, 76, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .error-code {
      font-family: var(--font-display);
      font-size: clamp(8rem, 20vw, 16rem);
      font-weight: 800;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 2px rgba(245, 245, 245, 0.15);
      position: relative;
      z-index: 1;
      user-select: none;
    }

    .error-code::after {
      content: '404';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      color: var(--c-accent);
      -webkit-text-stroke: 0;
      opacity: 0.8;
      clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
    }

    .error-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 700;
      margin-top: -2rem;
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 2;
    }

    .error-text {
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      font-weight: 300;
      line-height: 1.6;
      color: rgba(245, 245, 245, 0.7);
      max-width: 50ch;
      margin-bottom: 3rem;
      position: relative;
      z-index: 2;
    }

    .error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2rem;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-radius: 0;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid transparent;
    }

    .btn svg {
      width: 16px;
      height: 16px;
      transition: transform 0.3s ease;
    }

    .btn--secondary {
      background-color: var(--c-accent);
      color: var(--c-dark);
      border-color: var(--c-accent);
    }

    .btn--secondary:hover {
      background-color: transparent;
      color: var(--c-accent);
    }

    .btn--secondary:hover svg {
      transform: translateX(4px);
    }

    .btn--outline {
      background-color: transparent;
      color: var(--c-light);
      border-color: rgba(245, 245, 245, 0.3);
    }

    .btn--outline:hover {
      border-color: var(--c-light);
      background-color: rgba(245, 245, 245, 0.05);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid rgba(245, 245, 245, 0.1);
      font-size: 0.85rem;
      color: rgba(245, 245, 245, 0.4);
    }

    .footer a {
      color: var(--c-accent);
      transition: color 0.3s ease;
    }

    .footer a:hover {
      color: var(--c-light);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .navbar {
        padding: 1rem 1.5rem;
      }
      .error-code {
        -webkit-text-stroke: 1px rgba(245, 245, 245, 0.15);
      }
      .error-title {
        margin-top: -1rem;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <a href="index.html" class="navbar__logo">NACHIMO<em>.</em></a>
  </nav>

  <!-- 404 Content -->
  <main class="error-container">
    <div class="error-code" aria-hidden="true">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-text">It looks like this page has been moved, deleted, or never existed. Let's get you back to building excellence.</p>
    <div class="error-actions">
      <a href="index.html" class="btn btn--secondary">
        Back to Home 
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </a>
      <a href="contact.html" class="btn btn--outline">Contact Support</a>
    </div>
  </main>

  <!-- Minimal Footer -->
  <footer class="footer">
    <span>&copy; 2026 NACHIMO CONTRACTORS LTD. All rights reserved.</span>
  </footer>

</body>
</html>
